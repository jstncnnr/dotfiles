# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 2
final_space: true
console_title_template: "{{ .Shell }} in {{ .Folder }}"
blocks:
- type: prompt
  alignment: left
  newline: true
  segments:
  - type: os
    style: powerline
    powerline_symbol: 
    leading_powerline_symbol: "<transparent>"
    foreground: p:white
    background: p:yellow
    template: " {{ .Icon }} "
  - type: path
    style: powerline
    powerline_symbol: 
    foreground: p:white
    background: p:blue
    template: " \uEA83 {{ .Path }} "
    properties:
      style: powerlevel
  - type: git
    style: powerline
    powerline_symbol: 
    foreground: p:black
    foreground_templates:
    - "{{ if or (.Working.Changed) (.Staging.Changed) }}p:black{{ end }}"
    - "{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:white{{ end }}"
    - "{{ if gt .Ahead 0 }}p:white{{ end }}"
    background: p:green
    background_templates:
    - "{{ if or (.Working.Changed) (.Staging.Changed) }}p:yellow{{ end }}"
    - "{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}"
    - "{{ if gt .Ahead 0 }}#49416D{{ end }}"
    - "{{ if gt .Behind 0 }}#7A306C{{ end }}"
    template: " {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} \uf044 {{ .Working.String }}{{ end }}{{ if .Staging.Changed }} \uf046 {{ .Staging.String }}{{ end }} "
    properties:
      branch_max_length: 25
      fetch_status: true
      fetch_upstream_icon: true
- type: prompt
  alignment: right
  segments:
  - type: executiontime
    style: powerline
    powerline_symbol: "<transparent>"
    leading_powerline_symbol: 
    foreground: p:black
    background: p:yellow
    properties:
        style: round
- type: prompt
  alignment: left
  newline: true
  segments:
  - type: text
    style: plain
    foreground: p:white
    template: ""
transient_prompt:
  background: transparent
  foreground: p:white
  template: " "

palette:
  black: "#262B44"
  blue: "#4B95E9"
  green: "#59C9A5"
  orange: "#F07623"
  red: "#D81E5B"
  white: "#E0DEF4"
  yellow: "#F3AE35"
